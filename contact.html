<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">

    <title>اتصل بنا | منصة محاميكم</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* ===== التصميم الأصلي بالكامل ===== */
        :root { 
            --bg-dark: #0a0f2b; 
            --gold-main: #f9d77a; 
            --glass-bg: rgba(255, 255, 255, 0.03); 
            --glass-border: rgba(249, 215, 122, 0.15); 
        }
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: 'Cairo', sans-serif; 
        }
        body { 
            background-color: var(--bg-dark); 
            color: #e2e8f0; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            padding: 20px; 
        }
        .contact-card { 
            background: var(--glass-bg); 
            border: 1px solid var(--glass-border); 
            padding: 50px; 
            border-radius: 30px; 
            backdrop-filter: blur(20px); 
            max-width: 650px; 
            text-align: center; 
            width: 100%; 
        }
        h1 { 
            color: var(--gold-main); 
            margin-bottom: 20px; 
            font-weight: 900; 
        }
        p { 
            margin-bottom: 40px; 
            color: #94a3b8; 
        }
        .contact-methods { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 20px; 
        }
        .method { 
            padding: 24px 12px; 
            background: rgba(255,255,255,0.05); 
            border-radius: 20px; 
            text-decoration: none; 
            color: white; 
            border: 1px solid transparent; 
            transition: 0.3s ease; 
            font-weight: 700; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: center; 
            gap: 12px;
            text-align: center;
        }
        /* أيقونات كبيرة وواضحة */
        .method i {
            font-size: 3.2rem;
            transition: transform 0.2s;
        }
        /* تنسيق النص أسفل الأيقونة */
        .method span {
            font-size: 0.95rem;
            color: #cbd5e1;
            transition: 0.3s ease;
            font-weight: 600;
        }
        /* لمسة ذهبية للأيقونة والنص عند المرور */
        .method:hover i {
            transform: scale(1.05);
        }
        .method:hover span {
            color: var(--gold-main);
        }
        .method:hover { 
            border-color: var(--gold-main); 
            background: rgba(249, 215, 122, 0.1); 
            transform: translateY(-3px);
        }
        .btn-back { 
            display: inline-block; 
            margin-top: 45px; 
            color: #94a3b8; 
            text-decoration: none; 
            font-size: 0.9rem; 
            transition: 0.2s;
        }
        .btn-back:hover {
            color: var(--gold-main);
        }
        /* جعل التجاوب ممتاز مع الشاشات الصغيرة */
        @media (max-width: 550px) {
            .contact-card { padding: 35px 20px; }
            .contact-methods { grid-template-columns: repeat(2, 1fr); gap: 15px; }
            .method { padding: 20px 8px; }
            .method i { font-size: 2.5rem; }
            .method span { font-size: 0.85rem; }
        }
        @media (max-width: 400px) {
            .contact-methods { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="contact-card">
